name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (optional - defaults to manifest.json)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build .otzplugin (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version and tag
        id: tag
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $manifest = Get-Content manifest.json -Raw -Encoding UTF8 | ConvertFrom-Json
          $inputVersion = '${{ inputs.version }}'
          if ($inputVersion -ne '') {
            $version = $inputVersion
          } else {
            $version = $manifest.version
          }
          $tag = "v$version"
          $pluginId = $manifest.id
          $pluginFile = "$pluginId-$version.otzplugin"
          "version=$version"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag"               | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "plugin_id=$pluginId"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "plugin_file=$pluginFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "tag=$tag version=$version file=$pluginFile"

      - name: Sync manifest version (workflow_dispatch override)
        if: ${{ inputs.version != '' }}
        shell: pwsh
        env:
          NEW_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          $manifestPath = 'manifest.json'
          $content = Get-Content $manifestPath -Raw -Encoding UTF8
          $pattern = '("version"\s*:\s*")[^"]+(")'
          if ($content -notmatch $pattern) {
            Write-Error "version field not found in $manifestPath"
            exit 1
          }
          $new = [regex]::Replace($content, $pattern, "`${1}$($env:NEW_VERSION)`${2}", 1)
          if ($new -eq $content) {
            Write-Host "manifest.json already at version $env:NEW_VERSION"
          } else {
            [System.IO.File]::WriteAllText((Resolve-Path $manifestPath), $new, (New-Object System.Text.UTF8Encoding $false))
            Write-Host "manifest.json version -> $env:NEW_VERSION"
          }

      - name: Build plugin (.otzplugin)
        shell: pwsh
        env:
          PLUGIN_FILE: ${{ steps.tag.outputs.plugin_file }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path $env:PLUGIN_FILE) { Remove-Item $env:PLUGIN_FILE -Force }

          # Stage only the files that belong in the package
          $staging = Join-Path $env:RUNNER_TEMP 'plugin-staging'
          if (Test-Path $staging) { Remove-Item $staging -Recurse -Force }
          New-Item -ItemType Directory -Path $staging | Out-Null

          $include = @('manifest.json', 'index.html', 'css', 'js', 'fonts')
          foreach ($item in $include) {
            if (-not (Test-Path $item)) {
              Write-Error "Required path missing from repo: $item"
              exit 1
            }
            Copy-Item -Path $item -Destination $staging -Recurse -Force
          }

          Compress-Archive -Path (Join-Path $staging '*') -DestinationPath $env:PLUGIN_FILE -Force
          Write-Host "Created $env:PLUGIN_FILE"

      - name: Verify package contents
        shell: pwsh
        env:
          PLUGIN_FILE: ${{ steps.tag.outputs.plugin_file }}
        run: |
          Add-Type -Assembly System.IO.Compression.FileSystem
          $z = [System.IO.Compression.ZipFile]::OpenRead("$PWD\$env:PLUGIN_FILE")
          $z.Entries | ForEach-Object { "{0,12}  {1}" -f $_.Length, $_.FullName }
          $hasManifest = $z.Entries | Where-Object { $_.FullName -eq 'manifest.json' }
          $z.Dispose()
          if (-not $hasManifest) {
            Write-Error "manifest.json missing from package root"
            exit 1
          }

      - name: Compute SHA-256
        id: sha
        shell: pwsh
        env:
          PLUGIN_FILE: ${{ steps.tag.outputs.plugin_file }}
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 ".\$env:PLUGIN_FILE").Hash.ToLower()
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "SHA-256: $hash"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.tag.outputs.plugin_id }}-${{ steps.tag.outputs.version }}
          path: ${{ steps.tag.outputs.plugin_file }}
          if-no-files-found: error

      - name: Check if release already exists
        id: release_check
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release view $env:TAG --repo $env:GITHUB_REPOSITORY 1>$null 2>$null
          $code = $LASTEXITCODE
          $global:LASTEXITCODE = 0
          if ($code -eq 0) {
            Write-Host "Release $env:TAG already exists - skipping create"
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "Release $env:TAG does not exist yet"
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          exit 0

      - name: Create GitHub Release
        if: steps.release_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.tag.outputs.plugin_file }}
          body: |
            ## תוסף תיקון קוראים — ${{ steps.tag.outputs.tag }}

            תיקון קוראים אינטראקטיבי עם תמיכה מלאה בהלכות סת"ם.

            ### התקנה
            הורד את `${{ steps.tag.outputs.plugin_file }}` למטה, ובאוצריא:
            **כלים → 🧩 תוספים → ⊕ התקן תוסף חדש**, ובחר את הקובץ.

            ### Checksum
            ```
            SHA-256: ${{ steps.sha.outputs.sha256 }}
            ```

      - name: Publish update to otzaria.org
        if: ${{ env.OTZARIA_USER != '' && env.OTZARIA_PASSWORD != '' && env.OTZARIA_PLUGIN_ID != '' }}
        shell: pwsh
        env:
          OTZARIA_BASE_URL: ${{ vars.OTZARIA_BASE_URL }}
          OTZARIA_USER: ${{ secrets.OTZARIA_USER }}
          OTZARIA_PASSWORD: ${{ secrets.OTZARIA_PASSWORD }}
          OTZARIA_PLUGIN_ID: ${{ secrets.OTZARIA_PLUGIN_ID }}
          NEW_VERSION: ${{ steps.tag.outputs.version }}
          PLUGIN_FILE: ${{ steps.tag.outputs.plugin_file }}
        run: |
          $ErrorActionPreference = 'Stop'
          $base = if ($env:OTZARIA_BASE_URL) { $env:OTZARIA_BASE_URL.TrimEnd('/') } else { 'https://otzaria.org' }

          # 1) CSRF token (cookie persisted in $sess)
          $csrf = Invoke-RestMethod -Uri "$base/api/auth/csrf" -SessionVariable sess -UseBasicParsing
          if (-not $csrf.csrfToken) { Write-Error 'Failed to fetch CSRF token'; exit 1 }

          # 2) Credentials login (NextAuth Credentials provider)
          $loginBody = @{
            csrfToken   = $csrf.csrfToken
            identifier  = $env:OTZARIA_USER
            password    = $env:OTZARIA_PASSWORD
            callbackUrl = "$base/library/admin/plugins"
            json        = 'true'
          }
          try {
            $null = Invoke-WebRequest -Uri "$base/api/auth/callback/credentials" `
              -Method Post -Body $loginBody -WebSession $sess `
              -UseBasicParsing -MaximumRedirection 5
          } catch {
            Write-Error "Login request failed: $($_.Exception.Message)"; exit 1
          }

          # 3) Verify session (admin OR plugin owner — backend enforces ownership)
          $session = Invoke-RestMethod -Uri "$base/api/auth/session" -WebSession $sess -UseBasicParsing
          if (-not $session.user) {
            Write-Error 'Login failed: empty session (check OTZARIA_USER / OTZARIA_PASSWORD)'; exit 1
          }
          Write-Host "Logged in as $($session.user.email) (role: $($session.user.role))"

          # 4) Fetch current plugin fields (admin edit endpoint)
          $editUrl = "$base/api/admin/plugins/$env:OTZARIA_PLUGIN_ID/edit"
          $current = Invoke-RestMethod -Uri $editUrl -WebSession $sess -UseBasicParsing
          Write-Host "Current site version: $($current.version) -> new: $env:NEW_VERSION"

          if ($current.version -eq $env:NEW_VERSION) {
            Write-Host "::notice::otzaria.org already at version $env:NEW_VERSION - skipping upload"
            exit 0
          }

          if (-not (Test-Path $env:PLUGIN_FILE)) {
            Write-Error "Plugin file not found: $env:PLUGIN_FILE"; exit 1
          }

          # 5) Build multipart and PUT the update
          $tagsJson = ConvertTo-Json -InputObject @($current.tags) -Compress
          if ($tagsJson -eq 'null') { $tagsJson = '[]' }

          $form = @{
            name             = $current.name
            shortDescription = $current.shortDescription
            description      = $current.description
            version          = $env:NEW_VERSION
            status           = $current.status
            author           = $current.author
            compatibleWith   = $current.compatibleWith
            requiresNetwork  = if ($current.requiresNetwork) { 'true' } else { 'false' }
            tags             = $tagsJson
            homepage         = if ($current.homepage) { $current.homepage } else { '' }
            pluginFile       = Get-Item -Path $env:PLUGIN_FILE
          }

          $result = Invoke-RestMethod -Uri $editUrl -Method Put -Form $form -WebSession $sess -UseBasicParsing
          $result | ConvertTo-Json -Depth 5
          Write-Host "::notice::Plugin updated on $base (version $env:NEW_VERSION)"
